<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prediksi Medis Yoga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="card mx-auto shadow" style="max-width: 500px;">
            <div class="card-header bg-dark text-white text-center">
                <h4>Form Analisis Medis</h4>
            </div>
            <div class="card-body">
                
                <form action="/predict" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Usia (Age)</label>
                        <input type="number" name="Age" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Gender (1=Laki, 0=Perempuan)</label>
                        <input type="number" name="Gender" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Blood Type (Angka)</label>
                        <input type="number" name="Blood Type" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Medical Condition (Angka)</label>
                        <input type="number" name="Medical Condition" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Cek Hasil</button>
                </form>

                {% if prediction_text %}
                <div class="alert alert-success mt-4">
                    {{ prediction_text }}
                </div>
                {% endif %}

            </div>
        </div>
    </div>

</body>
</html>
