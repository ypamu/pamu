<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Kondisi Medis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #2c3e50; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-4">Form Prediksi Medis</h3>
                
                <form action="/predict" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label">Usia (Age)</label>
                        <input type="number" name="Age" class="form-control" placeholder="Contoh: 25" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Jenis Kelamin (Gender)</label>
                        <select class="form-select" name="Gender" required>
                            <option value="1">Laki-laki (1)</option>
                            <option value="0">Perempuan (0)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Golongan Darah (Blood Type)</label>
                        <select class="form-select" name="Blood Type" required>
                            <option value="0">A</option>
                            <option value="1">B</option>
                            <option value="2">AB</option>
                            <option value="3">O</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Kondisi Medis</label>
                        <select class="form-select" name="Medical Condition" required>
                            <option value="0">Normal</option>
                            <option value="1">Diabetes</option>
                            <option value="2">Hipertensi</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">PREDIKSI SEKARANG</button>
                    </div>
                </form>

                {% if prediction_text %}
                <div class="alert alert-info mt-4 text-center">
                    <strong>{{ prediction_text }}</strong>
                </div>
                {% endif %}

            </div>
        </div>
    </div>
</div>

</body>
</html>
