<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prediksi Tagihan Rumah Sakit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card mx-auto" style="max-width: 500px;">
            <div class="card-body">
                <h3 class="card-title text-center">Input Data Pasien</h3>
                <form action="/predict" method="POST">
                    
                    <div class="mb-3">
                        <label>Usia (Age):</label>
                        <input type="number" name="Age" class="form-control" placeholder="Contoh: 30" required>
                    </div>

                    <div class="mb-3">
                        <label>Jenis Kelamin (Gender):</label>
                        <select name="Gender" class="form-select" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Golongan Darah (Blood Type):</label>
                        <select name="Blood Type" class="form-select" required>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Kondisi Medis (Medical Condition):</label>
                        <select name="Medical Condition" class="form-select" required>
                            <option value="Cancer">Cancer</option>
                            <option value="Obesity">Obesity</option>
                            <option value="Diabetes">Diabetes</option>
                            <option value="Asthma">Asthma</option>
                            <option value="Hypertension">Hypertension</option>
                            <option value="Arthritis">Arthritis</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Hitung Estimasi Tagihan</button>
                </form>

                {% if prediction_text %}
                <div class="alert alert-success mt-4">
                    {{ prediction_text }}
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
